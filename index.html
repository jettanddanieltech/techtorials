<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHTORIALS | BUILD BOX SHOP</title>
    <style>
        /* This section forces the site to NOT be just a black void */
        body {
            background-color: #0a0a0a; /* Dark gray, not pure black */
            color: white;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            padding: 0;
            display: block; /* Ensures content isn't hidden */
        }

        header {
            padding: 80px 20px;
            text-align: center;
            border-bottom: 2px solid #222;
        }

        /* The Stacked Logo */
        .logo-box {
            display: inline-block;
            border: 5px solid #FF6B00; /* Industrial Orange */
            padding: 20px 40px;
            background: #000;
        }

        .t-top {
            font-size: 4rem;
            color: #FF6B00;
            margin: 0;
            line-height: 0.9;
        }

        .t-bottom {
            font-size: 4rem;
            color: #ffffff;
            margin: 0;
            line-height: 0.9;
        }

        /* The Product Grid */
        .container {
            max-width: 1000px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .box-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 30px;
            text-align: center;
        }

        .box-card h2 {
            color: #FF6B00;
            margin-top: 0;
        }

        .btn {
            display: inline-block;
            background: #FF6B00;
            color: black;
            padding: 10px 20px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn:hover {
            background: white;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <h1 class="t-top">TECH</h1>
            <h1 class="t-bottom">TORIALS</h1>
        </div>
        <p style="color: #666; font-family: monospace; margin-top: 15px;">> PHYSICAL BUILD KITS READY FOR DISPATCH</p>
    </header>

    <div class="container">
        <div class="box-card">
            <h2>KIT_01: SCREEN</h2>
            <p>Complete display repair unit.</p>
            <a href="#" class="btn">ORDER BOX</a>
        </div>

        <div class="box-card">
            <h2>KIT_02: POWER</h2>
            <p>High-capacity battery swap.</p>
            <a href="#" class="btn">ORDER BOX</a>
        </div>
    </div>

    <p style="text-align: center; color: #444; font-size: 0.8rem;">
        <a href="https://jettanddanieltech.github.io" style="color: #444;">← BACK TO MAIN SITE</a>
    </p>

</body>
</html>
