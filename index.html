<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TECHTORIALS | THE BUILD BOX</title>
    <style>
        :root {
            --ind-orange: #FF6B00;
            --bg-dark: #080808;
            --card-gray: #121212;
            --box-tan: #d2b48c;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Arial Black', sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Top Shipping Ticker */
        .ticker {
            background: var(--ind-orange);
            color: black;
            padding: 10px;
            text-align: center;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: bold;
            border-bottom: 2px solid black;
        }

        /* The Stacked Industrial Logo */
        header {
            padding: 60px 20px;
            text-align: center;
            background: radial-gradient(circle, #1a1a1a 0%, #080808 100%);
            border-bottom: 4px solid #222;
        }

        .logo-badge {
            display: inline-block;
            border: 5px solid var(--ind-orange);
            padding: 20px 40px;
            background: #000;
            transform: skewX(-4deg);
            text-align: left;
        }

        .tech-top {
            font-size: 4.5rem;
            color: var(--ind-orange);
            line-height: 0.8;
            margin: 0;
        }

        .tor-bottom {
            font-size: 4.5rem;
            color: #fff;
            line-height: 0.8;
            margin: 0;
        }

        .logo-sub {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #666;
            margin-top: 15px;
            letter-spacing: 6px;
        }

        /* Product Grid */
        .shop-container {
            max-width: 1200px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            padding: 20px;
        }

        .kit-card {
            background: var(--card-gray);
            border: 2px solid #222;
            border-radius: 5px;
            transition: 0.3s;
            position: relative;
        }

        .kit-card:hover {
            border-color: var(--ind-orange);
            transform: translateY(-5px);
        }

        /* Physical Box Visual */
        .box-preview {
            height: 250px;
            background-color: var(--box-tan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            border-bottom: 2px solid #222;
            position: relative;
        }

        .box-preview::after {
            content: 'TECHTORIALS_SHIPPING_UNIT';
            position: absolute;
            bottom: 10px;
            font-size: 0.7rem;
            color: rgba(0,0,0,0.3);
            font-family: 'Courier New', monospace;
        }
